# ═══════════════════════════════════════════════════════════
# fail2ban 过滤规则 · 40x 错误批量检测
# ═══════════════════════════════════════════════════════════
#
# 编号: ZY-SVR-F2B-006-4XX
# 部署路径: /etc/fail2ban/filter.d/novel-4xx.conf
# 守护: 铸渊 · ICE-GL-ZY001
# 版权: 国作登字-2026-A-00037559
#
# 检测: 短时间内大量 400/403/404/405 响应
# 用途: 通用扫描行为拦截（与路径扫描互补）
#
# ═══════════════════════════════════════════════════════════

[Definition]
failregex = ^<HOST> .+".+ HTTP/[^ ]+" (400|403|404|405) .*$

ignoreregex = ^<HOST> .+"GET /favicon\.ico HTTP/[^ ]+" .*$
              ^<HOST> .+"GET /robots\.txt HTTP/[^ ]+" .*$
