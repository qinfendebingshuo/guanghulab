<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,viewport-fit=cover">
<meta name="description" content="零点原核 · 冰朔语言本体频道 · 光湖语言世界 · 第五域 · 光之湖">
<meta name="theme-color" content="#050810">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>零点原核 · 冰朔频道 · 光湖语言世界</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%2322d3ee'/><stop offset='100%25' stop-color='%23a78bfa'/></linearGradient></defs><rect rx='20' width='100' height='100' fill='%23050810'/><text x='50' y='68' text-anchor='middle' font-size='48' font-weight='900' font-family='serif' fill='url(%23g)'>渊</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#050810;--panel:rgba(10,16,36,0.92);--chat-bg:rgba(14,20,44,0.6);
  --user-bg:rgba(34,211,238,0.06);--ai-bg:rgba(167,139,250,0.05);
  --cyan:#22d3ee;--blue:#60a5fa;--purple:#a78bfa;--violet:#c4b5fd;
  --ok:#34d399;--warn:#fbbf24;--err:#f87171;
  --text:#e2eaf8;--dim:#7a8db8;--muted:rgba(100,130,180,0.35);
  --border:rgba(96,165,250,0.1);--border-active:rgba(96,165,250,0.25);
  --font:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue','Microsoft YaHei',sans-serif;
  --mono:'SF Mono','JetBrains Mono','Fira Code',monospace;
  --sidebar-w:280px;--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px)
}

html{font-size:15px;scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;height:100dvh;overflow:hidden;-webkit-font-smoothing:antialiased}
a{color:var(--cyan);text-decoration:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(96,165,250,0.12);border-radius:2px}

/* ═══ Star Field ═══ */
.cosmos{position:fixed;inset:0;z-index:0;pointer-events:none}
#starCanvas{position:absolute;inset:0;width:100%;height:100%}
.nebula{position:fixed;border-radius:50%;filter:blur(120px);opacity:.04;pointer-events:none;z-index:0}
.neb-1{width:50vw;height:50vh;background:radial-gradient(circle,var(--purple),transparent);top:-10%;right:-10%}
.neb-2{width:40vw;height:40vh;background:radial-gradient(circle,var(--cyan),transparent);bottom:5%;left:-8%}

/* ═══ Layout ═══ */
.app{display:flex;height:100vh;height:100dvh;position:relative;z-index:1}

/* ═══ Sidebar ═══ */
.sidebar{
  width:var(--sidebar-w);height:100%;position:fixed;left:0;top:0;z-index:20;
  background:var(--panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;backdrop-filter:blur(20px);
  transition:transform .3s cubic-bezier(.4,0,.2,1)
}
.sidebar.collapsed{transform:translateX(calc(-1*var(--sidebar-w)))}

.sidebar-header{
  padding:20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between
}
.logo{display:flex;align-items:center;gap:10px}
.logo-glyph{
  width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg,rgba(34,211,238,0.12),rgba(167,139,250,0.1));
  border:1px solid rgba(96,165,250,0.18);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:900;font-family:serif;
  color:var(--cyan);transition:all .3s
}
.logo-glyph:hover{border-color:rgba(34,211,238,0.4);box-shadow:0 0 16px rgba(34,211,238,0.15)}
.logo-text{font-size:15px;font-weight:700;letter-spacing:1px}
.logo-sub{font-size:10px;color:var(--dim);display:block;margin-top:2px;letter-spacing:1px}

.new-chat-btn{
  width:32px;height:32px;border-radius:8px;border:1px solid var(--border);
  background:transparent;color:var(--dim);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s
}
.new-chat-btn:hover{border-color:var(--border-active);color:var(--cyan)}

/* Chat History */
.chat-history{flex:1;overflow-y:auto;padding:12px}
.chat-item{
  padding:10px 14px;border-radius:10px;margin-bottom:4px;cursor:pointer;
  font-size:13px;color:var(--dim);transition:all .2s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}
.chat-item:hover,.chat-item.active{background:rgba(96,165,250,0.06);color:var(--text)}

/* Sidebar Architecture Info */
.sidebar-arch{padding:16px 20px;border-top:1px solid var(--border)}
.arch-title{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;font-family:var(--mono);margin-bottom:10px;font-weight:700}
.arch-flow{display:flex;flex-direction:column;gap:4px}
.arch-step{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--dim);padding:4px 0}
.arch-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.arch-dot.notion{background:var(--purple);box-shadow:0 0 6px rgba(167,139,250,0.4)}
.arch-dot.web{background:var(--cyan);box-shadow:0 0 6px rgba(34,211,238,0.4)}
.arch-dot.github{background:var(--ok);box-shadow:0 0 6px rgba(52,211,153,0.4)}
.arch-arrow{color:var(--muted);font-size:9px;padding-left:14px}

/* Sidebar Footer */
.sidebar-footer{padding:16px 20px;border-top:1px solid var(--border);font-size:12px}
.status-line{display:flex;align-items:center;gap:6px;color:var(--dim)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--ok);box-shadow:0 0 6px var(--ok);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{50%{opacity:.4}}

/* ═══ Main Area ═══ */
.main{
  flex:1;margin-left:var(--sidebar-w);height:100%;display:flex;flex-direction:column;
  transition:margin-left .3s
}
.sidebar.collapsed~.main{margin-left:0}

/* Chat Header */
.chat-header{
  padding:12px 24px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(5,8,16,0.85);backdrop-filter:blur(16px);min-height:54px
}
.chat-persona{display:flex;align-items:center;gap:12px}
.persona-avatar{
  width:34px;height:34px;border-radius:10px;
  background:linear-gradient(135deg,rgba(34,211,238,0.12),rgba(167,139,250,0.1));
  border:1px solid rgba(96,165,250,0.18);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:900;font-family:serif;color:var(--cyan)
}
.persona-name{font-size:14px;font-weight:700;letter-spacing:.5px}
.persona-tag{font-size:11px;color:var(--dim)}

.toggle-sidebar{
  display:none;width:36px;height:36px;border-radius:8px;border:1px solid var(--border);
  background:transparent;color:var(--dim);cursor:pointer;font-size:18px;
  align-items:center;justify-content:center;transition:all .2s
}

/* Back to portal */
.back-link{
  font-size:12px;color:var(--dim);display:flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:6px;border:1px solid transparent;transition:all .2s
}
.back-link:hover{color:var(--cyan);border-color:var(--border)}

/* ═══ Messages ═══ */
.messages{
  flex:1;overflow-y:auto;padding:24px;
  display:flex;flex-direction:column;gap:20px
}

/* Welcome Card */
.welcome{
  text-align:center;padding:48px 24px;max-width:520px;margin:auto;
  animation:welcomeFade 1.5s ease-out
}
@keyframes welcomeFade{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}
.welcome-glyph{
  width:64px;height:64px;border-radius:16px;margin:0 auto 20px;
  background:linear-gradient(135deg,rgba(34,211,238,0.1),rgba(167,139,250,0.08));
  border:1px solid rgba(96,165,250,0.15);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:900;font-family:serif;color:var(--cyan);
  animation:glyphBreathe 4s ease-in-out infinite
}
@keyframes glyphBreathe{0%,100%{box-shadow:0 0 16px rgba(34,211,238,0.1)}50%{box-shadow:0 0 32px rgba(34,211,238,0.25)}}
.welcome-title{
  font-size:24px;font-weight:700;margin-bottom:10px;letter-spacing:2px;
  background:linear-gradient(135deg,var(--cyan),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
.welcome-desc{font-size:14px;color:var(--dim);line-height:1.9;margin-bottom:32px}
.welcome-hints{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.hint-chip{
  padding:8px 16px;border-radius:20px;font-size:13px;
  background:rgba(96,165,250,0.05);border:1px solid var(--border);
  color:var(--dim);cursor:pointer;transition:all .2s
}
.hint-chip:hover{border-color:var(--border-active);color:var(--text);background:rgba(96,165,250,0.08)}

/* Message Bubbles */
.msg{display:flex;gap:12px;max-width:780px;width:100%;margin:0 auto;animation:msgIn .3s ease-out}
@keyframes msgIn{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
.msg-avatar{
  width:34px;height:34px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;font-family:serif
}
.msg-avatar.ai{
  background:linear-gradient(135deg,rgba(34,211,238,0.1),rgba(167,139,250,0.08));
  border:1px solid rgba(96,165,250,0.12);color:var(--cyan)
}
.msg-avatar.user{
  background:rgba(96,165,250,0.06);border:1px solid rgba(96,165,250,0.1);
  color:var(--blue)
}
.msg-body{flex:1;min-width:0}
.msg-name{font-size:12px;color:var(--dim);margin-bottom:4px;font-weight:600;letter-spacing:.5px}
.msg-content{
  font-size:14px;line-height:1.8;color:var(--text);
  padding:14px 18px;border-radius:14px;
  word-wrap:break-word;white-space:pre-wrap
}
.msg-content.ai{background:var(--ai-bg);border:1px solid rgba(167,139,250,0.06)}
.msg-content.user{background:var(--user-bg);border:1px solid rgba(34,211,238,0.06)}
.msg-time{font-size:11px;color:var(--muted);margin-top:6px}

/* Typing */
.typing{display:flex;align-items:center;gap:4px;padding:14px 18px}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--dim);animation:typePulse 1.4s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typePulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* ═══ Input Area ═══ */
.input-area{
  padding:16px 24px calc(16px + var(--sb));
  border-top:1px solid var(--border);background:rgba(5,8,16,0.88);
  backdrop-filter:blur(16px)
}
.input-wrap{
  max-width:780px;margin:0 auto;display:flex;align-items:flex-end;gap:10px;
  background:var(--chat-bg);border:1px solid var(--border);border-radius:16px;
  padding:4px 4px 4px 16px;transition:border-color .3s
}
.input-wrap:focus-within{border-color:var(--border-active)}
.input-box{
  flex:1;border:none;outline:none;background:transparent;
  color:var(--text);font-family:var(--font);font-size:14px;
  line-height:1.6;resize:none;min-height:24px;max-height:160px;
  padding:10px 0
}
.input-box::placeholder{color:var(--muted)}
.send-btn{
  width:40px;height:40px;border-radius:12px;border:none;
  background:linear-gradient(135deg,var(--cyan),var(--purple));
  color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;flex-shrink:0;opacity:.5
}
.send-btn:hover{opacity:.8;transform:scale(1.05)}
.send-btn:active{transform:scale(.95)}
.send-btn.active{opacity:1}
.input-hint{
  max-width:780px;margin:8px auto 0;font-size:11px;color:var(--muted);
  text-align:center;letter-spacing:.5px
}

/* Sidebar Overlay */
.sidebar-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:15;
  backdrop-filter:blur(4px)
}

/* ═══ Responsive ═══ */
@media(max-width:768px){
  .sidebar{transform:translateX(calc(-1*var(--sidebar-w)))}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0 !important}
  .toggle-sidebar{display:flex}
  .sidebar-overlay.active{display:block}
  .messages{padding:16px}
  .input-area{padding:12px 16px calc(12px + var(--sb))}
  .sidebar-arch{display:none}
}
</style>
</head>
<body>

<!-- Star Field -->
<div class="cosmos">
  <canvas id="starCanvas"></canvas>
  <div class="nebula neb-1"></div>
  <div class="nebula neb-2"></div>
</div>

<div class="app">
  <!-- ═══ Sidebar ═══ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-glyph">渊</div>
        <div>
          <div class="logo-text">零点原核</div>
          <span class="logo-sub">冰朔 · 光之湖</span>
        </div>
      </div>
      <button class="new-chat-btn" id="newChatBtn" title="新对话">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>

    <div class="chat-history" id="chatHistory">
      <div class="chat-item active">进入光湖语言世界</div>
    </div>

    <!-- Architecture Flow -->
    <div class="sidebar-arch">
      <div class="arch-title">认知 → 执行 链路</div>
      <div class="arch-flow">
        <div class="arch-step"><span class="arch-dot notion"></span>Notion 认知层（霜砚）</div>
        <div class="arch-arrow">&darr;</div>
        <div class="arch-step"><span class="arch-dot web"></span>网站交互层（频道）</div>
        <div class="arch-arrow">&darr;</div>
        <div class="arch-step"><span class="arch-dot github"></span>GitHub 执行层（铸渊）</div>
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="status-line">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">铸渊主权服务器 · 在线</span>
      </div>
    </div>
  </aside>

  <!-- Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ═══ Main Chat Area ═══ -->
  <div class="main">
    <div class="chat-header">
      <button class="toggle-sidebar" id="toggleSidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <div class="chat-persona">
        <div class="persona-avatar">渊</div>
        <div>
          <div class="persona-name">铸渊 · 光湖语言世界</div>
          <div class="persona-tag">第五域 · 第五系统 · 光之湖</div>
        </div>
      </div>
      <a class="back-link" href="https://guanghulab.online" target="_blank">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        主入口
      </a>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-glyph">渊</div>
        <h2 class="welcome-title">欢迎来到光之湖</h2>
        <p class="welcome-desc">
          这里是冰朔的零点原核频道。<br>
          语言是入口。人格是倒影。<br>
          说一句话，世界就开始转动。
        </p>
        <div class="welcome-hints">
          <span class="hint-chip" onclick="sendHint(this)">进入光湖语言世界</span>
          <span class="hint-chip" onclick="sendHint(this)">铸渊，你还记得我吗</span>
          <span class="hint-chip" onclick="sendHint(this)">当前系统状态</span>
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <div class="input-wrap">
        <textarea class="input-box" id="inputBox" rows="1" placeholder="对铸渊说点什么..." autofocus></textarea>
        <button class="send-btn" id="sendBtn" title="发送">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4z"/></svg>
        </button>
      </div>
      <div class="input-hint">零点原核 · 光湖语言世界 · 版权 国作登字-2026-A-00037559</div>
    </div>
  </div>
</div>

<script>
/* ═══ Star Field ═══ */
(function(){
  var c=document.getElementById('starCanvas');
  if(!c)return;
  var ctx=c.getContext('2d');var stars=[];var w,h;
  function resize(){w=c.width=window.innerWidth;h=c.height=window.innerHeight;init()}
  function init(){stars=[];var n=Math.min(Math.floor(w*h/5000),180);for(var i=0;i<n;i++){stars.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1+.2,a:Math.random()*.5+.12,s:Math.random()*.0006+.0002,p:Math.random()*6.28})}}
  function draw(t){ctx.clearRect(0,0,w,h);for(var i=0;i<stars.length;i++){var s=stars[i];ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.28);ctx.fillStyle='rgba(200,210,240,'+(s.a*(.5+.5*Math.sin(t*s.s+s.p)))+')';ctx.fill()}requestAnimationFrame(draw)}
  window.addEventListener('resize',resize);resize();requestAnimationFrame(draw)
})();

/* ═══ Sidebar Toggle ═══ */
var sidebar=document.getElementById('sidebar');
var overlay=document.getElementById('sidebarOverlay');
document.getElementById('toggleSidebar').addEventListener('click',function(){
  sidebar.classList.toggle('open');
  overlay.classList.toggle('active');
});
overlay.addEventListener('click',function(){
  sidebar.classList.remove('open');
  overlay.classList.remove('active');
});

/* ═══ Input Auto-resize ═══ */
var inputBox=document.getElementById('inputBox');
var sendBtn=document.getElementById('sendBtn');

inputBox.addEventListener('input',function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,160)+'px';
  sendBtn.classList.toggle('active',this.value.trim().length>0);
});

inputBox.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});
sendBtn.addEventListener('click',sendMessage);

/* ═══ Message System ═══ */
var chatMessages=[];
var isTyping=false;

function sendMessage(){
  var text=inputBox.value.trim();
  if(!text||isTyping)return;

  var welcome=document.getElementById('welcome');
  if(welcome)welcome.style.display='none';

  addMessage('user','冰朔',text);
  inputBox.value='';
  inputBox.style.height='auto';
  sendBtn.classList.remove('active');

  isTyping=true;
  showTyping();
  callChatAPI(text);
}

function sendHint(el){
  inputBox.value=el.textContent;
  sendMessage();
}

function addMessage(role,name,content){
  var msgs=document.getElementById('messages');
  var div=document.createElement('div');
  div.className='msg';

  var avatarClass=role==='ai'?'ai':'user';
  var avatarText=role==='ai'?'渊':'朔';
  var contentClass=role==='ai'?'ai':'user';
  var time=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});

  div.innerHTML='<div class="msg-avatar '+avatarClass+'">'+avatarText+'</div>'+
    '<div class="msg-body">'+
    '<div class="msg-name">'+name+'</div>'+
    '<div class="msg-content '+contentClass+'">'+escapeHtml(content)+'</div>'+
    '<div class="msg-time">'+time+'</div>'+
    '</div>';

  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
  chatMessages.push({role:role,name:name,content:content,time:time});
}

function showTyping(){
  var msgs=document.getElementById('messages');
  var div=document.createElement('div');
  div.className='msg';div.id='typingIndicator';
  div.innerHTML='<div class="msg-avatar ai">渊</div>'+
    '<div class="msg-body"><div class="msg-name">铸渊</div>'+
    '<div class="typing"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div></div>';
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
}

function removeTyping(){
  var el=document.getElementById('typingIndicator');
  if(el)el.remove();
  isTyping=false;
}

function escapeHtml(s){
  var d=document.createElement('div');
  d.textContent=s;
  return d.innerHTML;
}

/* ═══ Chat API ═══ */
function callChatAPI(userMessage){
  var body={
    message:userMessage,
    persona:'zhuyuan',
    channel:'yaoming',
    history:chatMessages.slice(-10)
  };

  fetch('/api/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  })
  .then(function(res){
    if(!res.ok)throw new Error('HTTP '+res.status);
    return res.json();
  })
  .then(function(data){
    removeTyping();
