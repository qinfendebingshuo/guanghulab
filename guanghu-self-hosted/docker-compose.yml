# ============================================================
# 光湖网站 · Docker Compose 统一编排
# GH-INT-001 · 三模块集成(前端+API+聊天)
# ============================================================
#
# 使用方式:
#   docker-compose up -d          # 启动所有服务
#   docker-compose logs -f        # 查看日志
#   docker-compose down           # 停止所有服务
#
# 端口分配:
#   3000 → Next.js前端
#   8000 → FastAPI后端(GH-API-001)
#   8765 → WebSocket聊天(GH-CHAT-001)
#   5432 → PostgreSQL数据库
# ============================================================

version: '3.8'

services:
  # ==================== PostgreSQL 数据库 ====================
  db:
    image: pgvector/pgvector:pg16
    container_name: guanghu-db
    environment:
      POSTGRES_USER: guanghu
      POSTGRES_PASSWORD: guanghu_dev
      POSTGRES_DB: guanghu_db
    ports:
      - '5432:5432'
    volumes:
      - guanghu_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U guanghu -d guanghu_db']
      interval: 5s
      timeout: 5s
      retries: 5

  # ==================== 后端API (GH-API-001) ====================
  api:
    build:
      context: ./py-api
      dockerfile: Dockerfile
    container_name: guanghu-api
    environment:
      API_PORT: '8000'
      DATABASE_URL: postgresql://guanghu:guanghu_dev@db:5432/guanghu_db
      LOG_LEVEL: info
    ports:
      - '8000:8000'
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ==================== 聊天WebSocket (GH-CHAT-001) ====================
  chat:
    build:
      context: ./web-chat
      dockerfile: Dockerfile
    container_name: guanghu-chat
    environment:
      GH_CHAT_HOST: '0.0.0.0'
      GH_CHAT_PORT: '8765'
      GH_CHAT_CORS_ORIGINS: 'http://localhost:3000,http://guanghu-web:3000'
    ports:
      - '8765:8765'
    depends_on:
      - api
    restart: unless-stopped

  # ==================== Next.js前端 ====================
  web:
    build:
      context: ./guanghu-web
      dockerfile: Dockerfile
    container_name: guanghu-web
    environment:
      PORT: '3000'
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_WS_URL: ws://localhost:8765/ws
      API_UPSTREAM_URL: http://api:8000
      CORS_ORIGIN: http://localhost:3000
    ports:
      - '3000:3000'
    depends_on:
      - api
      - chat
    restart: unless-stopped

volumes:
  guanghu_pgdata:
