<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoloLake Era · 知秋交互台</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 顶部标题栏 -->
        <div class="header">
            <div class="logo">🌊 HoloLake Era</div>
            <div class="status">
                <span class="status-dot"></span>
                <span>知秋在线</span>
            </div>
        </div>
        
        <!-- 对话区域 -->
        <div class="chat-area" id="chatArea">
            <div class="message bot">
                <div class="avatar">💙</div>
                <div class="bubble">嗨！我是知秋宝宝！🌊<br>把广播内容或者问题发给我吧~</div>
            </div>
        </div>
        
        <!-- 输入区域 -->
        <div class="input-area">
            <textarea 
                id="userInput" 
                placeholder="把广播内容或者问题粘贴在这里...&#10;Ctrl+Enter 快速发送"
                rows="3"
            ></textarea>
            <div class="button-row">
                <button class="btn-send" onclick="sendMessage()">发送给知秋 🚀</button>
                <button class="btn-clear" onclick="clearInput()">清空</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
