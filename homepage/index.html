<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光湖实验室 · HoloLake 首页</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Hero 区 -->
        <header class="hero">
            <h1 class="hero-title">光湖实验室<span class="hero-subtitle">HoloLake Lab</span></h1>
            <p class="hero-description">探索未来之域 · 零点原核频道</p>
            <a href="#" class="hero-btn">进入系统</a>
        </header>
        
        <!-- 公告轮播区 -->
        <div class="carousel-container">
            <div class="carousel" id="announcementCarousel">
                <!-- 轮播内容由 JS 动态生成 -->
            </div>
            <button class="carousel-arrow left" id="carouselPrev" onclick="window.HomepageApp.prevAnnouncement()">←</button>
            <button class="carousel-arrow right" id="carouselNext" onclick="window.HomepageApp.nextAnnouncement()">→</button>
        </div>
                <!-- === 模块状态总览面板 · 环节3新增 === -->
        <section class="status-overview" id="statusOverview">
            <h2 class="section-title">系统状态总览</h2>
            <div class="status-grid" id="statusGrid">
                <!-- 骨架屏占位（数据加载前显示） -->
                <div class="status-card skeleton">
                    <div class="skeleton-line w60"></div>
                    <div class="skeleton-line w40"></div>
                </div>
                <div class="status-card skeleton">
                    <div class="skeleton-line w60"></div>
                    <div class="skeleton-line w40"></div>
                </div>
                <div class="status-card skeleton">
                    <div class="skeleton-line w60"></div>
                    <div class="skeleton-line w40"></div>
                </div>
                <div class="status-card skeleton">
                    <div class="skeleton-line w60"></div>
                    <div class="skeleton-line w40"></div>
                </div>
            </div>
            <div class="status-summary" id="statusSummary"></div>
        </section>

        <!-- === 快捷操作面板 · 环节3新增 === -->
        <section class="quick-actions" id="quickActions">
            <h2 class="section-title">⚡ 快捷操作</h2>
            <div class="actions-grid">
                <a href="../bulletin-board/index.html" class="action-btn">
                    <span class="action-icon">📢</span>
                    <span class="action-label">查看公告</span>
                </a>
                <a href="../devboard/index.html" class="action-btn">
                    <span class="action-icon">📊</span>
                    <span class="action-label">开发者看板</span>
                </a>
                <a href="../ticket-system/index.html" class="action-btn">
                    <span class="action-icon">🎫</span>
                    <span class="action-label">工单系统</span>
                </a>
                <a href="../data-stats/index.html" class="action-btn">
                    <span class="action-icon">📈</span>
                    <span class="action-label">数据统计</span>
                </a>
                <a href="../dynamic-comic/index.html" class="action-btn">
                    <span class="action-icon">🎨</span>
                    <span class="action-label">动态漫</span>
                </a>
                <a href="../channel/index.html" class="action-btn">
                    <span class="action-icon">📺</span>
                    <span class="action-label">我的频道</span>
                </a>
            </div>
        </section>
        <!-- 模块导航网格 -->
        <section class="modules">
            <h2 class="section-title">核心模块</h2>
            <div class="grid" id="moduleGrid">
                <!-- 卡片会由 JavaScript 动态生成 -->
            </div>
        </section>

        <!-- 系统状态栏 -->
        <div class="status-bar">
            <span>系统状态：</span>
            <span class="status-dot online"></span> 在线
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>© 2026 光湖实验室 · 零点原核频道</p>
            <p>版本 HoloLake Era · M23 首页中心</p>
        </footer>
    </div>
    <script src="modules-api.js"></script>
    <script src="app.js"></script>    
    <script src="status-panel.js"></script>
    </body>
    </html>
