# ⚠️ 注意: guanghulab.online 已由新加坡服务器直接服务
#    前端部署主通道: deploy-to-zhuyuan-server.yml
#    此工作流仅作为 GitHub Pages 备份 (qinfendebingshuo.github.io/guanghulab/)
name: 🌀 光湖灯塔 · GitHub Pages 部署

on:
  push:
    branches:
      - main          # 仅 main 分支触发生产部署
    paths:
      - 'docs/**'
      - 'CNAME'
      - 'persona-studio/frontend/**'
      - '.github/brain/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare deployment artifacts
        run: |
          # Sync Persona Studio frontend
          mkdir -p docs/persona-studio
          if [ -d "persona-studio/frontend" ]; then
            cp -r persona-studio/frontend/* docs/persona-studio/
          fi
          # CNAME 已移除: guanghulab.online 由新加坡服务器直接服务
          # GitHub Pages 仅作为备份部署到 github.io 默认域名
          rm -f docs/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
