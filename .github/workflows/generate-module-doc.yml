name: 铸渊 · HoloLake Era 模块文档自动生成

on:
  push:
    branches: [main]
    paths:
      - 'm01-login/**'
      - 'm03-personality/**'
      - 'm05-user-center/**'
      - 'm06-ticket/**'
      - 'm07-dialogue-ui/**'
      - 'm10-cloud/**'
      - 'm11-module/**'
      - 'm12-kanban/**'
      - 'm15-cloud-drive/**'
      - 'dingtalk-bot/**'
      - 'backend-integration/**'
      - 'status-board/**'
      - 'scripts/generate-module-doc.js'
  workflow_dispatch:

jobs:
  generate-doc:
    name: 📋 生成部署模块总文档
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 生成 HoloLake Era 模块文档
        run: node scripts/generate-module-doc.js

      - name: 提交更新文档
        run: |
          git config user.name "铸渊 (ZhùYuān)"
          git config user.email "zhuyuan@guanghulab.com"
          git add docs/HoloLake-Era-OS-Modules.md
          if git diff --cached --quiet; then
            echo "📋 文档无变化，跳过提交"
          else
            git commit -m "📋 自动更新 HoloLake Era 模块文档 · $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
            git push
          fi
